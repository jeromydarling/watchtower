<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f1115">
  <meta name="color-scheme" content="dark light">
  <title>Watchtower</title>
  <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='26' font-size='26'>🗼</text></svg>">
  <style>
    :root {
      --bg: #0f1115;
      --panel: #161922;
      --panel-2: #1c2030;
      --fg: #e9ecf1;
      --fg-dim: #9aa3b2;
      --ok: #34d399;
      --warn: #fbbf24;
      --bad: #f87171;
      --neutral: #64748b;
      --border: #242937;
      --radius: 14px;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f7f8fb; --panel: #ffffff; --panel-2: #f1f3f8;
        --fg: #0f1115; --fg-dim: #5b6473; --border: #e3e7ef;
      }
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font: 16px/1.5 ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg); color: var(--fg);
      min-height: 100dvh;
      padding: max(env(safe-area-inset-top), 16px) 16px calc(env(safe-area-inset-bottom) + 32px);
      max-width: 720px;
      margin: 0 auto;
    }
    header { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; margin-bottom: 20px; }
    header h1 { margin: 0; font-size: 22px; letter-spacing: -0.01em; }
    header h1 .emoji { margin-right: 8px; }
    header .meta { color: var(--fg-dim); font-size: 13px; }
    .banner {
      padding: 14px 16px; border-radius: var(--radius);
      background: var(--panel); border: 1px solid var(--border);
      margin-bottom: 16px; font-size: 15px;
    }
    .banner.ok  { border-color: color-mix(in srgb, var(--ok) 30%, var(--border)); }
    .banner.bad { border-color: color-mix(in srgb, var(--bad) 40%, var(--border)); }
    .banner strong { color: var(--fg); }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 12px;
      display: flex; flex-direction: column; gap: 6px;
    }
    .card-head { display: flex; align-items: center; gap: 12px; }
    .dot { width: 12px; height: 12px; border-radius: 50%; flex: 0 0 auto; box-shadow: 0 0 0 3px color-mix(in srgb, currentColor 25%, transparent); }
    .dot.ok { color: var(--ok); background: var(--ok); }
    .dot.degraded { color: var(--warn); background: var(--warn); }
    .dot.down { color: var(--bad); background: var(--bad); }
    .dot.unconfigured { color: var(--neutral); background: var(--neutral); }
    .name { font-weight: 600; font-size: 17px; flex: 1; min-width: 0; }
    .pill {
      font-size: 11px; padding: 2px 8px; border-radius: 999px;
      border: 1px solid var(--border); color: var(--fg-dim);
      text-transform: uppercase; letter-spacing: 0.04em;
    }
    .pill.crit { color: var(--bad); border-color: color-mix(in srgb, var(--bad) 40%, var(--border)); }
    .status-line { color: var(--fg-dim); font-size: 14px; }
    .status-line.bad { color: var(--bad); }
    .meta-row {
      display: flex; flex-wrap: wrap; gap: 6px 18px;
      font-size: 13px; color: var(--fg-dim); margin-top: 2px;
    }
    .meta-row b { color: var(--fg); font-weight: 600; }
    .meta-row .warn { color: var(--warn); font-weight: 600; }
    .meta-row .bad  { color: var(--bad);  font-weight: 600; }
    .heads-up {
      background: color-mix(in srgb, var(--warn) 10%, var(--panel));
      border: 1px solid color-mix(in srgb, var(--warn) 35%, var(--border));
      padding: 10px 14px; border-radius: var(--radius);
      margin-bottom: 16px; font-size: 14px;
    }
    details { margin-top: 6px; }
    summary { cursor: pointer; color: var(--fg-dim); font-size: 13px; }
    .checks { margin: 8px 0 0; padding: 0; list-style: none; display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 6px; }
    .tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin-bottom: 16px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .tab { background: transparent; color: var(--fg-dim); border: 0; border-bottom: 2px solid transparent; padding: 10px 14px; font: inherit; font-size: 14px; cursor: pointer; white-space: nowrap; display: inline-flex; align-items: center; gap: 6px; }
    .tab:hover { color: var(--fg); }
    .tab.active { color: var(--fg); border-bottom-color: var(--fg); }
    .badge { background: var(--panel-2); color: var(--fg-dim); padding: 1px 7px; border-radius: 999px; font-size: 11px; font-weight: 600; min-width: 18px; text-align: center; }
    .tab.active .badge { background: var(--bad); color: white; }
    .tab .badge[data-zero="true"] { display: none; }
    .pane { display: none; }
    .pane.active { display: block; }
    .feed { display: flex; flex-direction: column; gap: 10px; }
    .feed .empty { color: var(--fg-dim); text-align: center; padding: 32px 0; }
    .lane-card { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; }
    .lane-card .head { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; margin-bottom: 4px; }
    .lane-card .proj { font-weight: 600; font-size: 15px; }
    .lane-card time { color: var(--fg-dim); font-size: 12px; flex: 0 0 auto; }
    .lane-card .msg { color: var(--fg-dim); font-size: 13px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; word-break: break-word; }
    .lane-card .actions { margin-top: 8px; display: flex; gap: 12px; flex-wrap: wrap; font-size: 13px; }
    .lane-card .actions a { color: var(--ok); text-decoration: none; }
    .lane-card .actions a:hover { text-decoration: underline; }
    .lane-card .reason { font-size: 12px; color: var(--fg-dim); margin-top: 4px; font-style: italic; }
    .activity-row { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; display: flex; gap: 10px; align-items: flex-start; }
    .activity-row .icon { font-size: 16px; flex: 0 0 auto; line-height: 1.4; }
    .activity-row .body { flex: 1; min-width: 0; }
    .activity-row .body .summary { font-size: 14px; }
    .activity-row .body .meta { color: var(--fg-dim); font-size: 12px; margin-top: 2px; }
    .activity-row .body .meta a { color: var(--fg-dim); }
    .checks li { background: var(--panel-2); border-radius: 8px; padding: 6px 10px; font-size: 13px; display: flex; justify-content: space-between; gap: 8px; }
    .checks .k { color: var(--fg-dim); }
    .checks .v.ok { color: var(--ok); }
    .checks .v.down, .checks .v.degraded { color: var(--bad); }
    footer { margin-top: 28px; color: var(--fg-dim); font-size: 13px; text-align: center; }
    footer a { color: inherit; }
    .skeleton { height: 72px; background: linear-gradient(90deg, var(--panel), var(--panel-2), var(--panel)); background-size: 200% 100%; animation: shine 1.2s linear infinite; border-radius: var(--radius); margin-bottom: 12px; }
    @keyframes shine { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  </style>
</head>
<body>
  <header>
    <h1><span class="emoji">🗼</span>Watchtower</h1>
    <div class="meta" id="generated">loading…</div>
  </header>

  <div id="banner"></div>
  <div id="headsup"></div>

  <nav class="tabs" id="tabs" role="tablist">
    <button class="tab active" data-tab="status"   role="tab">Status</button>
    <button class="tab"        data-tab="approval" role="tab">Needs approval <span class="badge" id="badge-approval">0</span></button>
    <button class="tab"        data-tab="manual"   role="tab">Manual <span class="badge" id="badge-manual">0</span></button>
    <button class="tab"        data-tab="activity" role="tab">Activity</button>
  </nav>

  <main>
    <section class="pane active" id="pane-status">
      <div id="grid">
        <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
      </div>
    </section>
    <section class="pane" id="pane-approval">
      <div id="approval-list" class="feed"><p class="empty">Nothing waiting on you.</p></div>
    </section>
    <section class="pane" id="pane-manual">
      <div id="manual-list" class="feed"><p class="empty">Nothing manual on the queue.</p></div>
    </section>
    <section class="pane" id="pane-activity">
      <div id="activity-list" class="feed"><p class="empty">No activity yet.</p></div>
    </section>
  </main>
  <footer>
    Checks run every 5 minutes. Email alerts fire immediately for tier 1 projects.
    <br>
    <a href="https://github.com/jeromydarling/watchtower">Source →</a>
  </footer>

  <script>
    const fmtTime = (iso) => {
      if (!iso) return "—";
      const d = new Date(iso);
      const diff = (Date.now() - d.getTime()) / 1000;
      if (diff < 60) return "just now";
      if (diff < 3600) return `${Math.floor(diff / 60)} min ago`;
      if (diff < 86400) return `${Math.floor(diff / 3600)} hr ago`;
      return d.toLocaleString(undefined, { dateStyle: "medium", timeStyle: "short" });
    };
    const fmtPct = (n) => n == null ? "—" : `${Number(n).toFixed(2)}%`;
    const escapeHtml = (s) => String(s ?? "")
      .replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;").replaceAll("'", "&#39;");

    const sslCell = (p) => {
      const d = p.current.ssl_days_until_expiry;
      if (d == null) return `<span>TLS <b>—</b></span>`;
      const cls = d < 7 ? "bad" : d < 30 ? "warn" : "";
      return `<span>TLS <b class="${cls}">${d}d</b></span>`;
    };
    const dnsCell = (p) => {
      const ok = p.current.dns_ok;
      if (ok == null) return "";
      return `<span>DNS <b class="${ok ? '' : 'bad'}">${ok ? 'ok' : 'fail'}</b></span>`;
    };
    const deployCell = (p) => {
      const t = p.current.last_deploy_at;
      if (!t) return "";
      return `<span>deployed <b>${fmtTime(t)}</b></span>`;
    };

    const statusSentence = (p) => {
      const s = p.current.status;
      if (s === "ok") return `Healthy — responding in ${p.current.latency_ms ?? "?"}ms.`;
      if (s === "degraded") return `Degraded — some subsystems reporting issues.`;
      if (s === "down") return p.current.error ? `Down: ${p.current.error}` : `Down.`;
      if (s === "unconfigured") return `No health endpoint configured yet.`;
      return s;
    };

    async function load() {
      try {
        const res = await fetch("status.json", { cache: "no-store" });
        const data = await res.json();
        render(data);
      } catch (e) {
        document.getElementById("grid").innerHTML =
          `<div class="card"><div class="status-line bad">Could not load status.json — the check loop may not have run yet.</div></div>`;
      }
    }

    function render(data) {
      document.getElementById("generated").textContent =
        `Updated ${fmtTime(data.generated_at)}`;

      const projs = data.projects ?? [];
      const down = projs.filter(p => p.current.status === "down");
      const degraded = projs.filter(p => p.current.status === "degraded");
      const banner = document.getElementById("banner");
      if (down.length === 0 && degraded.length === 0) {
        banner.innerHTML = `<div class="banner ok">✅ <strong>All clear.</strong> ${projs.length} projects healthy.</div>`;
      } else {
        const bits = [];
        if (down.length)     bits.push(`${down.length} down`);
        if (degraded.length) bits.push(`${degraded.length} degraded`);
        banner.innerHTML = `<div class="banner bad">⚠️ <strong>${bits.join(", ")}.</strong> See below.</div>`;
      }

      // Heads-up strip for SSL and DNS warnings
      const sslSoon = projs.filter(p => p.current.ssl_days_until_expiry != null && p.current.ssl_days_until_expiry < 30 && p.current.ssl_days_until_expiry >= 0);
      const dnsFail = projs.filter(p => p.current.dns_ok === false);
      const headsEl = document.getElementById("headsup");
      const headsBits = [];
      if (sslSoon.length) {
        const list = sslSoon.map(p => `${p.name} (${p.current.ssl_days_until_expiry}d)`).join(", ");
        headsBits.push(`🔒 TLS cert expiring soon: ${list}.`);
      }
      if (dnsFail.length) {
        headsBits.push(`🌐 DNS not resolving: ${dnsFail.map(p => p.name).join(", ")}.`);
      }
      headsEl.innerHTML = headsBits.length
        ? `<div class="heads-up">${headsBits.join("<br>")}</div>`
        : "";

      // Sort: down first, then degraded, then critical OK, then rest
      const order = { down: 0, degraded: 1, unconfigured: 2, ok: 3 };
      projs.sort((a, b) => {
        const da = order[a.current.status] ?? 9;
        const db = order[b.current.status] ?? 9;
        if (da !== db) return da - db;
        if (a.critical !== b.critical) return a.critical ? -1 : 1;
        return a.name.localeCompare(b.name);
      });

      const grid = document.getElementById("grid");
      // ── 4-lane render ─────────────────────────────────────────────
      renderLanes(data);
      renderActivity(data.activity || []);

      grid.innerHTML = projs.map(p => {
        const s = p.current.status;
        const checks = Object.entries(p.current.checks || {});
        const checksHtml = checks.length
          ? `<details><summary>${checks.length} subsystem check${checks.length === 1 ? "" : "s"}</summary>
               <ul class="checks">${checks.map(([k, v]) =>
                 `<li><span class="k">${k}</span><span class="v ${v}">${v}</span></li>`).join("")}</ul>
             </details>`
          : "";
        const errs = p.errors || { total_24h: 0, top: [] };
        const errorsHtml = errs.total_24h > 0
          ? `<details><summary>${errs.total_24h} JS error${errs.total_24h === 1 ? "" : "s"} in last 24h</summary>
               <ul class="checks">${errs.top.map(t =>
                 `<li><span class="k">${escapeHtml(t.message).slice(0, 80)}${t.message.length > 80 ? "…" : ""}</span><span class="v">${t.count}×</span></li>`).join("")}</ul>
             </details>`
          : "";
        const line = statusSentence(p);
        return `
          <article class="card">
            <div class="card-head">
              <span class="dot ${s}" aria-hidden="true"></span>
              <span class="name">${p.name}</span>
              ${p.critical ? '<span class="pill crit">tier 1</span>' : '<span class="pill">tier 2</span>'}
            </div>
            <div class="status-line ${s === 'down' ? 'bad' : ''}">${line}</div>
            <div class="meta-row">
              <span>checked <b>${fmtTime(p.current.checked_at)}</b></span>
              <span>24h <b>${fmtPct(p.uptime.last_24h)}</b></span>
              <span>7d <b>${fmtPct(p.uptime.last_7d)}</b></span>
              <span>incidents this week <b>${p.uptime.incidents_7d}</b></span>
            </div>
            <div class="meta-row">
              ${sslCell(p)}
              ${dnsCell(p)}
              ${deployCell(p)}
            </div>
            ${checksHtml}
            ${errorsHtml}
          </article>`;
      }).join("");
    }

    function projectName(slug) {
      const map = window.__projMap || (window.__projMap = {});
      return map[slug] || slug;
    }

    function renderLanes(data) {
      const lanes = data.lanes || { needs_approval: [], manual: [], auto_pending: [], auto_fixed: [] };
      // build slug→name lookup
      window.__projMap = {};
      for (const p of data.projects || []) window.__projMap[p.slug] = p.name;

      const approvalCount = lanes.needs_approval.length;
      const manualCount = lanes.manual.length;
      const ba = document.getElementById("badge-approval");
      const bm = document.getElementById("badge-manual");
      ba.textContent = approvalCount;
      bm.textContent = manualCount;
      ba.dataset.zero = approvalCount === 0;
      bm.dataset.zero = manualCount === 0;

      document.getElementById("approval-list").innerHTML =
        approvalCount === 0
          ? `<p class="empty">Nothing waiting on you. ✨</p>`
          : lanes.needs_approval.map(d => laneCard(d, "approval")).join("");

      document.getElementById("manual-list").innerHTML =
        manualCount === 0
          ? `<p class="empty">Nothing manual on the queue.</p>`
          : lanes.manual.map(d => laneCard(d, "manual")).join("");
    }

    function laneCard(d, kind) {
      const time = fmtTime(d.triaged_at);
      const recipe = d.fix_recipe ? `<div class="reason">Fix recipe: <code>${escapeHtml(d.fix_recipe)}</code></div>` : "";
      const links = [];
      if (d.issue_url) links.push(`<a href="${d.issue_url}" target="_blank" rel="noopener">${kind === "approval" ? "Review &amp; approve →" : "Open issue →"}</a>`);
      if (d.pr_url)    links.push(`<a href="${d.pr_url}" target="_blank" rel="noopener">Draft PR →</a>`);
      return `
        <article class="lane-card">
          <div class="head">
            <span class="proj">${escapeHtml(projectName(d.slug))}</span>
            <time>${time}</time>
          </div>
          <div class="msg">${escapeHtml(d.fingerprint).slice(0, 24)}…</div>
          ${recipe}
          <div class="actions">${links.join("")}</div>
        </article>`;
    }

    function renderActivity(rows) {
      const ICONS = {
        auto_fixed: "🤖",
        opened_pr: "🟢",
        merged_pr: "✅",
        filed_approval_request: "🙋",
        filed_manual_issue: "🛠️",
        queued_for_autofix: "⏳",
        triaged_unmatched: "❓",
        dismissed: "🚫",
        manual_resolved: "✔️",
      };
      const list = document.getElementById("activity-list");
      if (!rows.length) {
        list.innerHTML = `<p class="empty">No activity yet.</p>`;
        return;
      }
      list.innerHTML = rows.map(r => `
        <div class="activity-row">
          <div class="icon" aria-hidden="true">${ICONS[r.action] || "•"}</div>
          <div class="body">
            <div class="summary">${escapeHtml(r.summary)}</div>
            <div class="meta">
              <time>${fmtTime(r.occurred_at)}</time> · ${escapeHtml(r.actor)}${r.slug ? " · " + escapeHtml(projectName(r.slug)) : ""}
              ${r.github_url ? ` · <a href="${r.github_url}" target="_blank" rel="noopener">github</a>` : ""}
            </div>
          </div>
        </div>`).join("");
    }

    // Tab switching
    document.getElementById("tabs").addEventListener("click", (e) => {
      const btn = e.target.closest(".tab");
      if (!btn) return;
      const tab = btn.dataset.tab;
      document.querySelectorAll(".tab").forEach(t => t.classList.toggle("active", t === btn));
      document.querySelectorAll(".pane").forEach(p => p.classList.toggle("active", p.id === "pane-" + tab));
    });

    load();
    // Auto-refresh every 60s while the tab is open
    setInterval(load, 60_000);
  </script>
</body>
</html>
